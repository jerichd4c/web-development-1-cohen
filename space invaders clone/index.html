<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders Clone</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="layout">
        <div id="game-container">
            <canvas id="gameCanvas" width="800" height="950"></canvas>
        </div>
        <div id="hud-container">
            <div id="hud-left" class="hud">Stage: <span id="stage-value">1</span></div>
            <div id="hud-right" class="hud">Score: <span id="score-value">0</span></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
